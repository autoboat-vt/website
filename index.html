<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta
            name="description"
            content="AutoBoat at Virginia Tech designs and builds autonomous sailboats and electric motorboats for robotics competitions. Join our team!"
        >
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap"
            rel="stylesheet"
        >
        <title>AutoBoat | Virginia Tech</title>
    </head>
    <body>
        <script>
            // Apply theme before first paint to avoid FOUC.
            // Order: saved preference > system preference > light.
            (() => {
                var stored = localStorage.getItem("autoboat-theme");
                var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                var dark = stored ? stored === "dark" : prefersDark;
                if (dark) document.documentElement.classList.add("dark");
            })();
        </script>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
