<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta
            name="description"
            content="AutoBoat at Virginia Tech designs and builds autonomous sailboats and electric motorboats for robotics competitions. Join our team!"
        >

        <!-- Theme: mobile browser UI bar color (light + dark variants) -->
        <meta name="theme-color" content="#f0eee6" media="(prefers-color-scheme: light)">
        <meta name="theme-color" content="#1f1e1d" media="(prefers-color-scheme: dark)">

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="/images/favicon.ico">

        <!-- Social: Open Graph -->
        <meta property="og:type" content="website">
        <meta property="og:title" content="AutoBoat | Virginia Tech">
        <meta
            property="og:description"
            content="AutoBoat at Virginia Tech designs and builds autonomous sailboats and electric motorboats for robotics competitions. Join our team!"
        >
        <meta property="og:image" content="/images/favicon.ico">

        <title>AutoBoat | Virginia Tech</title>
    </head>
    <body>
        <script>
            // Apply theme before first paint to avoid FOUC.
            // Also sets color-scheme so native UI (scrollbars, form controls)
            // matches the theme immediately, before CSS loads.
            // Order: saved preference > system preference > light.
            (() => {
                const stored = localStorage.getItem("autoboat-theme");
                const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                const dark = stored ? stored === "dark" : prefersDark;
                const root = document.documentElement;
                root.style.colorScheme = dark ? "dark" : "light";
                if (dark) root.classList.add("dark");
            })();
        </script>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
