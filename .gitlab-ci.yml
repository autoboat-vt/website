# GitLab CI: build the site and deploy the built files to `main` (no force push).
#
# The VT host (autoboat.aoe.vt.edu) serves the root of this repo as static
# content — it does NOT run a build step. So this pipeline builds the React
# app and pushes the contents of dist/ as a regular commit on top of `main`
# (fast-forward, no force push, no orphan branch).
#
# The deploy commit's tree contains ONLY built files (source is removed from
# the index), but the history is preserved, so the push is always a
# fast-forward and works even with `main` protected against force-push.
#
# IMPORTANT: This pipeline pushes to `main` with `ci.skip` to avoid triggering
# a loop. Source pushes to `main` should also use `ci.skip` (or push to a
# different branch) to avoid non-fast-forward errors after a deploy has
# added a commit on top of the source.
#
# For routine deploys, prefer the local `./scripts/deploy.sh` (pushes from
# GitHub source to VT GitLab main). This CI is useful when source lives on
# the VT GitLab directly.

stages:
  - build
  - deploy

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web" # manual trigger from GitLab UI

variables:
  GIT_DEPTH: 0 # need full history to fast-forward on top of remote main

# ---------------------------------------------------------------------------
# Build: install deps, typecheck, build the static site
# ---------------------------------------------------------------------------
build:
  stage: build
  image: oven/bun:latest
  interruptible: true
  cache:
    key:
      files:
        - bun.lock
    paths:
      - node_modules/
  script:
    - bun --version
    - bun install --frozen-lockfile
    - bun run typecheck
    - bun run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day

# ---------------------------------------------------------------------------
# Deploy: commit dist/ contents on top of main (fast-forward, no force)
# ---------------------------------------------------------------------------
deploy:
  stage: deploy
  image: alpine:latest
  needs:
    - build
  before_script:
    - apk add --no-cache git
    - git config --global user.email "gitlab-ci@autoboat.vt.edu"
    - git config --global user.name "GitLab CI"
    - git remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    # Create a worktree based on the latest origin/main (which may have
    # previous deploy commits on top of the source). Replace all contents
    # with the built dist/ files, commit, and push as a fast-forward.
    - export WORKDIR="$(mktemp -d)"
    - git fetch origin main
    - git worktree add "$WORKDIR" origin/main
    - cd "$WORKDIR"
    - git rm -rf . 2>/dev/null || true
    - cp -r "${CI_PROJECT_DIR}/dist/." .
    - git add -A
    - |
      git commit -m "Deploy: built from ${CI_COMMIT_SHORT_SHA}" \
        -m "Source commit: ${CI_COMMIT_SHA}" \
        -m "Pipeline: ${CI_PIPELINE_URL}"
    # ci.skip prevents this push from triggering a new pipeline (avoid loop)
    - git push -o ci.skip origin HEAD:main
    - cd "${CI_PROJECT_DIR}"
    - git worktree remove --force "$WORKDIR"
  environment:
    name: production
    url: https://autoboat.aoe.vt.edu/
